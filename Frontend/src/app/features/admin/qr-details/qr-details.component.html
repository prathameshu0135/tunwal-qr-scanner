<div class="page">

  <div class="topbar">
    <div class="brand">
      <img src="/assets/logo.png" class="logo" alt="Logo">

      <div>
        <h1>QR Details</h1>
        <p>Warranty QR Management</p>
      </div>
    </div>

    <div class="actions">
      <a mat-stroked-button routerLink="/admin/qr-list">
        ← Back to QR List
      </a>
    </div>
  </div>

  <div class="loading-box" *ngIf="loading()">
    Loading QR Details...
  </div>

  <div class="error" *ngIf="error()">
    {{ error() }}
  </div>

  <div class="success" *ngIf="success()">
    {{ success() }}
  </div>

  <ng-container *ngIf="data() as d">

    <div class="summary-card">

      <div class="qr-preview">

        <img
          *ngIf="d.qr?.qrImageDataUrl"
          [src]="d.qr.qrImageDataUrl"
          class="qr-image">

        <h2>{{ d.qr?.qrId }}</h2>

      </div>

      <div class="qr-meta">

        <div class="meta-box">
          <label>QR Status</label>

          <span class="status-pill"
            [ngClass]="getStatusClass(d.qr?.status)">
            {{ d.qr?.status }}
          </span>
        </div>

        <div class="meta-box">
          <label>Warranty Status</label>

          <span class="status-pill"
            [ngClass]="getWarrantyClass(d.qr?.warrantyStatus)">
            {{ d.qr?.warrantyStatus || 'Pending' }}
          </span>
        </div>

        <div class="meta-box">
          <label>Created On</label>

          <strong>
            {{ d.qr?.createdAt | date:'dd MMM yyyy' }}
          </strong>
        </div>

        <div class="meta-box">
          <label>Blocked Reason</label>

          <strong>
            {{ d.qr?.blockedReason || '-' }}
          </strong>
        </div>

      </div>

      <div class="summary-actions">

        <button
          mat-raised-button
          color="primary"
          (click)="enableEdit()"
          *ngIf="!editMode()">

          Edit
        </button>

        <button
          mat-raised-button
          color="warn"
          *ngIf="d.qr?.status!='blocked'"
          (click)="blockQr()">

          Block QR
        </button>

        <button
          mat-raised-button
          color="primary"
          *ngIf="d.qr?.status=='blocked'"
          (click)="unblockQr()">

          Unblock QR
        </button>

      </div>

    </div>


    <form
      *ngIf="editMode()"
      [formGroup]="form">

      <mat-card class="card">

        <h2>Edit QR</h2>

        <label>QR Status</label>

        <select formControlName="status">

          <option value="active">Active</option>

          <option value="inactive">Inactive</option>

          <option value="blocked">Blocked</option>

        </select>


        <label>Warranty Status</label>

        <select formControlName="warrantyStatus">

          <option value="pending">Pending</option>

          <option value="registered">Registered</option>

        </select>


        <label>Blocked Reason</label>

        <textarea
          rows="4"
          formControlName="blockedReason">
        </textarea>


        <div class="edit-actions">

          <button
            mat-stroked-button
            type="button"
            (click)="cancelEdit()">

            Cancel

          </button>

          <button
            mat-raised-button
            color="primary"
            type="button"
            (click)="saveChanges()"
            [disabled]="saving()">

            {{ saving() ? 'Saving...' : 'Save Changes' }}

          </button>

        </div>

      </mat-card>

    </form>

  </ng-container>

</div>
